name: Update M3U8 Playlist

on:
  workflow_dispatch: # Sadece sen istersen siteden çalışır, push atınca veya 20 dakikada bir kendi kendine ASLA çalışmaz!

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper beautifulsoup4

    - name: Generate Playlist
      run: python main.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        if [ -f playlist.m3u8 ]; then
          git add playlist.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Manual update playlist.m3u8" && git push)
        fi
